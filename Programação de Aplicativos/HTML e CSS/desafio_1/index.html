<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="principal">
        <div class="linha">
            <div class="quadrado q1">
                <div class="quadradinho"></div>
                <div class="quadradinho"></div>
            </div>
            <div class="quadrado q2">
                <div class="quadradinho"></div>
            </div>
            <div class="quadrado">

                <div class="separador-1">
                    <div class="quadradinho a1"></div>
                </div>

                <div class="separador-2">
                    <div class="quadradinho a2"></div>
                </div>

            </div>
            <div class="quadrado q3">
                <div class="quadradinho"></div>
            </div>
        </div>

        <div class="linha coluna-centro">
            <div class="quadrado q4">
                <div class="quadradinho"></div>
            </div>
            <div class="quadrado">
                <div class="s-1">
                    <div class="quadradinho"></div>
                </div>
                <div class="s-2">
                    <div class="quadradinho"></div>
                    <div class="quadradinho"></div>
                </div>
                <div class="s-3">
                    <div class="quadradinho"></div>
                </div>
            </div>
            <div class="quadrado q5">
                <div class="quadradinho"></div>
            </div>
        </div>

        <div class="linha coluna-baixo">
            <div class="quadrado">
                <div class="s-4">
                    <div class="quadradinho"></div>
                </div>
                <div class="s-5">
                    <div class="quadradinho"></div>
                </div>
            </div>
            <div class="quadrado q2">
                <div class="quadradinho"></div>
            </div>
            <div class="quadrado q6">
                <div class="quadradinho"></div>
            </div>
        </div>
    </div>
</body>
</html>
