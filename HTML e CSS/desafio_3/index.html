<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="linha l1">
        <div class="s1">
            <div class="quadrado">
                <div class="s1-1">
                    <div class="quadradinho"></div>
                </div>
                <div class="s1-2">
                    <div class="quadradinho"></div>
                </div>
            </div>
        </div>
        <div class="s2">
            <div class="quadradinho" style="background-color: palevioletred;"></div>
        </div>
        <div class="s3">
            <div class="quadrado">
                <div class="s3-1">
                    <div class="quadradinho"></div>
                </div>
                <div class="s3-2">
                    <div class="quadradinho"></div>
                </div>
            </div>
        </div> 
    </div>
    <div class="linha l2">
        <div class="quadrado vermelho">
            <div class="sep-ver1">
                <div class="quadradinho"></div>
            </div>
            <div class="sep-ver2">
                <div class="quadradinho"></div>
            </div>
        </div>

        <div class="quadrado azul">
            <div class="s1-azul">
                <div class="quadradinho"></div>
                <div class="quadradinho"></div>
            </div>
            <div class="s2-azul">
                <div class="quadradinho"></div>
            </div>
            <div class="s3-azul">
                <div class="quadradinho"></div>
                <div class="quadradinho"></div>
            </div>
        </div>
        <div class="quadrado laranja">
            <div class="s1-laranja">
                <div class="quadradinho"></div>
            </div>
            <div class="s2-laranja">
                <div class="quadradinho"></div>
            </div>
        </div>
    </div>
    <div class="linha l3">
        <div class="retangulo azul">
            <div class="bola branca"></div>
            <div class="bola branca"></div>
        </div>
        <div class="retangulo vermelho">
            <div class="bola amarela"></div>
        </div>
    </div>
</body>
</html>
